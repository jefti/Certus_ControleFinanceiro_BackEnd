spring:
  application:
    name: financeiro

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

auth:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration: 3600000

app:
  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}
    resend:
      api-key: ${RESEND_API_KEY:}
  password-recovery:
    expiration-minutes: ${PASSWORD_RECOVERY_EXPIRATION_MINUTES}
  actuator:
    username: ${APP_ACTUATOR_USERNAME}
    password: ${APP_ACTUATOR_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
    prometheus:
      enabled: true

